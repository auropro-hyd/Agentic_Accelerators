# Large stress-test fixture (125 tables, 5 schemas) — see
# tests/fixtures/postgres_large/README.md. Bring it up with:
#   docker compose -f apps/dla/tests/fixtures/postgres_large/docker-compose.yaml up -d
#   export DLA_DB_PASSWORD=dla_dev_password

source:
  source_id: fixture_postgres_large
  display_name: Fixture Postgres Large (5-schema stress test)
  provider: postgres
  postgres:
    host: localhost
    port: 55433
    database: dla_fixture_large
    username: dla
    password_env_var: DLA_DB_PASSWORD
    schemas:
      - sales
      - finance
      - hr
      - staging
      - analytics

runtime:
  bundle_dir: ./bundle_large
  log_format: console

thresholds:
  name_match_min_score: 0.85
  value_overlap_min_ratio: 0.5
  high_null_rate: 0.5
  high_null_rate_critical: 0.9
  sample_budget_rows: 10000
