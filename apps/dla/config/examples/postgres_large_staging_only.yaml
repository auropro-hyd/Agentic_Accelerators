# Staging-schema-only slice of the large fixture: ZERO declared foreign keys
# (cloud-warehouse dump simulation). Every relationship must be inferred, which
# is the interesting case for the strategy recommender's signals.

source:
  source_id: fixture_postgres_large_staging
  display_name: Fixture Postgres Large (no-FK staging zone only)
  provider: postgres
  postgres:
    host: localhost
    port: 55433
    database: dla_fixture_large
    username: dla
    password_env_var: DLA_DB_PASSWORD
    schemas:
      - staging

runtime:
  bundle_dir: ./bundle_staging
  log_format: console

thresholds:
  name_match_min_score: 0.85
  value_overlap_min_ratio: 0.5
  high_null_rate: 0.5
  high_null_rate_critical: 0.9
  sample_budget_rows: 10000
