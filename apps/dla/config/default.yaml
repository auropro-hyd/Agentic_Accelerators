# Default thresholds and budgets.
# Overridable per-engagement via the YAML config passed to `dla --config`.
# Every value here is read by `dla.config.models.ThresholdsConfig`.

thresholds:
  name_match_min_score: 0.85
  value_overlap_min_ratio: 0.5
  high_null_rate: 0.5
  high_null_rate_critical: 0.9
  sample_budget_rows: 10000
